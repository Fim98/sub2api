name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source code
        run: |
          echo "=== Checking Username field in setup.go ==="
          grep -n "Username" backend/internal/setup/setup.go || (echo "MISSING Username in setup.go!" && exit 1)
          echo "=== Checking Username field in config.go ==="
          grep -n "Username" backend/internal/config/config.go || (echo "MISSING Username in config.go!" && exit 1)
          echo "=== Checking Username field in redis.go ==="
          grep -n "Username" backend/internal/repository/redis.go || (echo "MISSING Username in redis.go!" && exit 1)
          echo "All checks passed!"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            --push \
            --build-arg GOPROXY=https://goproxy.cn,direct \
            --build-arg CACHE_BUST=$(date +%s) \
            -t ${{ secrets.DOCKER_USERNAME }}/sub2api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sub2api:${{ github.sha }} \
            -f Dockerfile \
            .
